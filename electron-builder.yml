appId: com.orpad.app
productName: OrPAD
asar: true
asarUnpack:
  - "node_modules/**/*.node"
  - "node_modules/@homebridge/node-pty-prebuilt-multiarch/**"
  - "src/renderer/terminal/shell-integration/**"
  # The self-contained bundled audit is spawned as a child process by the main
  # process (runbooks/ipc.js evidence check), so it must live on the real filesystem —
  # a spawned node process cannot read inside app.asar.
  - "dist/audit-orpad-run.mjs"
compression: maximum
electronLanguages:
  - en-US
  - ko
  - zh-CN
  - zh-TW
  - ja
  - de
  - fr
  - es
  - pt-BR
  - ru
directories:
  output: release
  buildResources: assets
files:
  - src/main/**/*
  - src/renderer/**/*
  - src/shared/**/*
  - src/locales/**/*
  - nodes/**/*
  - registry/**/*
  - dist/**/*
  - assets/**/*
  - scripts/audit-orpad-run.mjs
  - scripts/audit-orpad-node-schemas.mjs
  - package.json
  - "!node_modules/**/test/**"
  - "!node_modules/**/tests/**"
  - "!node_modules/**/*.md"
  - "!node_modules/**/*.map"
  - "!node_modules/**/LICENSE*"
  - "!node_modules/**/CHANGELOG*"
  - "!node_modules/**/docs/**"
  - "!node_modules/**/examples/**"
  - "!node_modules/**/.github/**"
  - "!node_modules/**/*.ts"
  - "!node_modules/**/build/**/*.iobj"
  - "!node_modules/**/build/**/*.ipdb"
  - "!node_modules/**/build/**/*.tlog"
  - "!node_modules/**/build/**/*.obj"
extraMetadata:
  main: src/main/main.js
win:
  target:
    - target: nsis
      arch:
        - x64
mac:
  target:
    - target: dmg
      arch:
        - universal
  category: public.app-category.developer-tools
  icon: assets/icon.icns
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null
  darkModeSupport: true
dmg:
  sign: false
  writeUpdateInfo: false
nsis:
  artifactName: "${productName}-Setup-${version}.${ext}"
  oneClick: false
  createDesktopShortcut: true
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  runAfterFinish: true
  multiLanguageInstaller: true
  displayLanguageSelector: true
  installerLanguages:
    - en_US
    - ko_KR
    - zh_CN
    - zh_TW
    - ja_JP
    - de_DE
    - fr_FR
    - es_ES
    - pt_BR
    - ru_RU
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  installerHeaderIcon: assets/icon.ico
protocols:
  - name: OrPAD Protocol
    schemes:
      - orpad
fileAssociations:
